<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heizen-Kühlen</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #000000;
            color: #e0e0e0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            width: 100%;
            height: 100vh;
            max-width: 800px;
            max-height: 100%;
            background: #1e1e1e;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 20px 0 20px;
            box-sizing: border-box;
            box-shadow: 0 10px 50px rgba(0,0,0,0.9);
            text-align: center;
        }
        h2 { border-bottom: 1px solid #333; width: 100%; padding-bottom: 10px; color: #ffffff; margin-top: 0; }
        .back-btn { display: block; width: 100%; padding: 15px; background: #34495e; color: white; border: none; border-radius: 6px; font-size: 16px; margin-top: 30px; cursor: pointer; text-align: center; text-decoration: none; font-weight: bold; box-sizing: border-box; transition: background 0.3s; }
        .back-btn:hover { background: #2c3e50; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Heizen-Kühlen</h2>
        <p style="font-size: 1.2rem; margin: 40px 0; color: #777;">under construction</p>
        <a href="/" class="back-btn">Zurück zur Hauptseite</a>
    </div>

    <script>
        async function fetchData() {
            try {
                await fetch('/api');
            } catch (e) { console.error("Fetch error", e); }
        }
        setInterval(fetchData, 5000);
        fetchData();
    </script>
</body>
</html>
