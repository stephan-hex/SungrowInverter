<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heimzentrale</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --accent-color: #e30613;
            --card-bg: #1e1e1e;
            --btn-bg: #2c2c2c;
            --btn-shadow: rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #000000;
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .hub-container {
            width: 100%;
            height: 100vh;
            max-width: 600px;
            max-height: 800px;
            background-color: var(--card-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 20px 0 20px;
            box-sizing: border-box;
            box-shadow: 0 10px 50px rgba(0,0,0,0.9);
        }

        .date-display { text-align: center; margin-top: 10px; }
        .date-display h1 { margin: 0; font-size: 1.5rem; color: #bbb; font-weight: 300; }
        .date-display h2 { margin: 5px 0; font-size: 1.2rem; color: var(--accent-color); }

        .clock-container { width: 220px; height: 220px; margin: 20px 0; }
        #station-clock { width: 100%; height: 100%; }

        .weather-widget {
            text-align: center; margin: 10px 0; padding: 15px; background: #252525;
            border-radius: 15px; width: 80%; box-shadow: 0 4px 6px var(--btn-shadow);
            color: #ffffff;
        }
        /* Wetter Animationen */
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes drift { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(5px); } }
        @keyframes rain { 0% { opacity: 0; transform: translateY(0); } 50% { opacity: 1; } 100% { opacity: 0; transform: translateY(10px); } }
        @keyframes pulse-icon { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.1);opacity:0.7} }
        .weather-temp { font-size: 2.5rem; font-weight: bold; }

        .button-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
            width: 100%; margin-top: 30px; padding: 0 10px;
        }

        .nav-button {
            background: var(--btn-bg); border: none; padding: 25px 10px;
            border-radius: 12px; font-size: 1.1rem; font-weight: bold;
            color: #ffffff; box-shadow: 0 4px 10px var(--btn-shadow);
            cursor: pointer; transition: transform 0.1s, background-color 0.2s;
            text-decoration: none; display: flex; justify-content: center;
            align-items: center; text-align: center;
        }
        .nav-button:active { transform: scale(0.95); background-color: #3d3d3d; }

        .status-bar {
            width: 100%;
            margin-top: auto;
            background: #000000;
            color: #666;
            padding: 10px 20px;
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
            box-sizing: border-box;
        }
        .status-ok { color: #51cf66; }
        .status-error { color: #e74c3c; }
    </style>
</head>
<body>

    <div class="hub-container">
        <div class="date-display">
            <h1 id="current-date">--. --. ----</h1>
            <h2 id="current-weekday">Montag</h2>
        </div>

        <div class="clock-container">
            <svg id="station-clock" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="48" fill="#1e1e1e" stroke="#444" stroke-width="2"/>
                <g id="marks"></g>
                <line id="hour" x1="50" y1="50" x2="50" y2="25" stroke="white" stroke-width="4" stroke-linecap="butt"/>
                <line id="minute" x1="50" y1="50" x2="50" y2="15" stroke="white" stroke-width="3" stroke-linecap="butt"/>
                <g id="second-group">
                    <line id="second" x1="50" y1="50" x2="50" y2="12" stroke="#e30613" stroke-width="1"/>
                    <circle cx="50" cy="12" r="3" fill="#e30613"/>
                </g>
                <circle cx="50" cy="50" r="2" fill="white"/>
            </svg>
        </div>

        <div class="weather-widget">
            <div id="weather-icon" style="height: 60px; margin-bottom: 5px; display: flex; justify-content: center; align-items: center;"></div>
            <div>Bad Boll</div>
            <div class="weather-temp" id="weather-temp">--°C</div>
            <div id="weather-desc">Lade Wetter...</div>
        </div>

        <div class="button-grid">
            <a href="/pv" class="nav-button">PV</a>
            <a href="/charge.html" class="nav-button">Laden</a>
            <a href="/heating-cooling.html" class="nav-button">Heizen-Kühlen</a>
            <a href="/others.html" class="nav-button">Sonstiges</a>
        </div>

        <div class="status-bar">
            <span>Server: <span id="server-status">Prüfe...</span></span>
            <span>Update: <span id="val_timestamp">--:--:--</span></span>
            <span id="live-clock">--:--:--</span>
        </div>
    </div>

    <script>
        function updateDate() {
            const now = new Date();
            const dateOptions = { day: '2-digit', month: 'long', year: 'numeric' };
            const weekdayOptions = { weekday: 'long' };
            document.getElementById('current-date').textContent = now.toLocaleDateString('de-DE', dateOptions);
            document.getElementById('current-weekday').textContent = now.toLocaleDateString('de-DE', weekdayOptions);
        }

        function createClockMarks() {
            const marks = document.getElementById('marks');
            for (let i = 0; i < 60; i++) {
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                const angle = i * 6;
                const isHour = i % 5 === 0;
                const r1 = isHour ? 38 : 42;
                const r2 = 46;
                line.setAttribute("x1", 50 + r1 * Math.sin(angle * Math.PI / 180));
                line.setAttribute("y1", 50 - r1 * Math.cos(angle * Math.PI / 180));
                line.setAttribute("x2", 50 + r2 * Math.sin(angle * Math.PI / 180));
                line.setAttribute("y2", 50 - r2 * Math.cos(angle * Math.PI / 180));
                line.setAttribute("stroke", isHour ? "white" : "#666");
                line.setAttribute("stroke-width", isHour ? 2.5 : 0.8);
                marks.appendChild(line);
            }
        }

        function updateClock() {
            const now = new Date();
            const s = now.getSeconds(), m = now.getMinutes(), h = now.getHours();
            const sDeg = s * 6, mDeg = m * 6 + s * 0.1, hDeg = (h % 12) * 30 + m * 0.5;
            document.getElementById('hour').setAttribute("transform", `rotate(${hDeg} 50 50)`);
            document.getElementById('minute').setAttribute("transform", `rotate(${mDeg} 50 50)`);
            document.getElementById('second-group').setAttribute("transform", `rotate(${sDeg} 50 50)`);
            document.getElementById('live-clock').textContent = now.toLocaleTimeString('de-DE');
        }

        async function checkServerStatus() {
            try {
                const response = await fetch('/api');
                if (!response.ok) throw new Error();
                const data = await response.json();
                document.getElementById('server-status').textContent = 'Verbunden';
                document.getElementById('server-status').className = 'status-ok';
                document.getElementById('val_timestamp').textContent = data.timestamp;
            } catch (e) {
                document.getElementById('server-status').textContent = 'Fehler';
                document.getElementById('server-status').className = 'status-error';
            }
        }

        async function updateWeather() {
            try {
                const lat = 48.6401, lon = 9.6146;
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`;
                const response = await fetch(url);
                if (!response.ok) throw new Error('Wetter-API nicht erreichbar');
                const data = await response.json();
                const temp = Math.round(data.current_weather.temperature);
                const code = data.current_weather.weathercode;

                const icons = {
                    clear: '<svg viewBox="0 0 64 64" width="50" height="50"><circle cx="32" cy="32" r="12" fill="#ffce54" style="animation: rotate 10s linear infinite; transform-origin: center;"/><g style="animation: rotate 20s linear infinite; transform-origin: center;"><line x1="32" y1="10" x2="32" y2="18" stroke="#ffce54" stroke-width="3" stroke-linecap="round"/><line x1="32" y1="46" x2="32" y2="54" stroke="#ffce54" stroke-width="3" stroke-linecap="round"/><line x1="10" y1="32" x2="18" y2="32" stroke="#ffce54" stroke-width="3" stroke-linecap="round"/><line x1="46" y1="32" x2="54" y2="32" stroke="#ffce54" stroke-width="3" stroke-linecap="round"/><line x1="16.5" y1="16.5" x2="22.1" y2="22.1" stroke="#ffce54" stroke-width="3" stroke-linecap="round"/><line x1="41.9" y1="41.9" x2="47.5" y2="47.5" stroke="#ffce54" stroke-width="3" stroke-linecap="round"/><line x1="16.5" y1="47.5" x2="22.1" y2="41.9" stroke="#ffce54" stroke-width="3" stroke-linecap="round"/><line x1="41.9" y1="22.1" x2="47.5" y2="16.5" stroke="#ffce54" stroke-width="3" stroke-linecap="round"/></g></svg>',
                    cloudy: '<svg viewBox="0 0 64 64" width="50" height="50"><path d="M46,38c0,4.4-3.6,8-8,8H22c-5.5,0-10-4.5-10-10c0-4.8,3.4-8.9,8-9.8c0.6-4.4,4.4-7.8,9-7.8c3.1,0,5.8,1.6,7.4,4c1.1-0.7,2.4-1.1,3.8-1.1c3.9,0,7,3.1,7,7c0,0.3,0,0.6-0.1,0.9C44.6,30.3,46,32.5,46,35C46,35,46,38,46,38z" fill="#ecf0f1" style="animation: drift 4s ease-in-out infinite;"/></svg>',
                    rain: '<svg viewBox="0 0 64 64" width="50" height="50"><path d="M46,38c0,4.4-3.6,8-8,8H22c-5.5,0-10-4.5-10-10c0-4.8,3.4-8.9,8-9.8c0.6-4.4,4.4-7.8,9-7.8c3.1,0,5.8,1.6,7.4,4c1.1-0.7,2.4-1.1,3.8-1.1c3.9,0,7,3.1,7,7c0,0.3,0,0.6-0.1,0.9C44.6,30.3,46,32.5,46,35C46,35,46,38,46,38z" fill="#ecf0f1"/><line x1="24" y1="48" x2="22" y2="54" stroke="#3498db" stroke-width="2" stroke-linecap="round" style="animation: rain 1s linear infinite;"/><line x1="32" y1="48" x2="30" y2="54" stroke="#3498db" stroke-width="2" stroke-linecap="round" style="animation: rain 1s linear infinite 0.3s;"/><line x1="40" y1="48" x2="38" y2="54" stroke="#3498db" stroke-width="2" stroke-linecap="round" style="animation: rain 1s linear infinite 0.6s;"/></svg>',
                    thunder: '<svg viewBox="0 0 64 64" width="50" height="50"><path d="M46,38c0,4.4-3.6,8-8,8H22c-5.5,0-10-4.5-10-10c0-4.8,3.4-8.9,8-9.8c0.6-4.4,4.4-7.8,9-7.8c3.1,0,5.8,1.6,7.4,4c1.1-0.7,2.4-1.1,3.8-1.1c3.9,0,7,3.1,7,7c0,0.3,0,0.6-0.1,0.9C44.6,30.3,46,32.5,46,35C46,35,46,38,46,38z" fill="#ecf0f1"/><polygon points="30,46 25,54 30,54 28,62 38,50 32,50 35,46" fill="#f1c40f" style="animation: pulse-icon 1s infinite;"/></svg>'
                };

                const weatherMap = { 
                    0: { text: "Klar", icon: icons.clear }, 
                    1: { text: "Heiter", icon: icons.clear }, 
                    2: { text: "Leicht bewölkt", icon: icons.cloudy }, 
                    3: { text: "Bedeckt", icon: icons.cloudy }, 
                    45: { text: "Nebel", icon: icons.cloudy }, 
                    61: { text: "Leichter Regen", icon: icons.rain }, 
                    63: { text: "Regen", icon: icons.rain }, 
                    80: { text: "Schauer", icon: icons.rain }, 
                    95: { text: "Gewitter", icon: icons.thunder } 
                };

                const weather = weatherMap[code] || { text: "Unbekannt", icon: icons.cloudy };
                document.getElementById('weather-temp').textContent = `${temp}°C`;
                document.getElementById('weather-desc').textContent = weather.text;
                document.getElementById('weather-icon').innerHTML = weather.icon;
            } catch (error) {
                document.getElementById('weather-desc').textContent = "Fehler";
            }
        }

        createClockMarks();
        setInterval(updateClock, 1000);
        setInterval(updateDate, 60000);
        setInterval(updateWeather, 1800000);
        setInterval(checkServerStatus, 5000);
        updateClock(); updateDate(); updateWeather();
        checkServerStatus();
    </script>
</body>
</html>
