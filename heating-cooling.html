<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heizen-Kühlen</title>
    <style>
        body { font-family: Helvetica, Arial, sans-serif; padding: 20px; background: #121212; color: #e0e0e0; }
        .container { max-width: 800px; margin: 0 auto; background: #1e1e1e; padding: 25px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); text-align: center;}
        h2 { border-bottom: 1px solid #333; padding-bottom: 10px; color: #ffffff; margin-top: 0; }
        .back-btn { display: block; width: 100%; padding: 15px; background: #34495e; color: white; border: none; border-radius: 6px; font-size: 16px; margin-top: 30px; cursor: pointer; text-align: center; text-decoration: none; font-weight: bold; box-sizing: border-box; transition: background 0.3s;}
        .back-btn:hover { background: #2c3e50; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Heizen-Kühlen</h2>
        <p style="font-size: 1.2rem; margin: 40px 0; color: #777;">under construction</p>
        <a href="/" class="back-btn">Zurück zur Hauptseite</a>
    </div>
    <div style="text-align: center; margin-top: 20px; font-size: 12px; color: #999;">
        Update: {timestamp}
    </div>
</body>
</html>
