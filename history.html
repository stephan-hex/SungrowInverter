<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leistungsverlauf - Sungrow</title>
    <style>
        body { font-family: Helvetica, Arial, sans-serif; padding: 20px; background: #121212; color: #e0e0e0; }
        .container { max-width: 800px; margin: 0 auto; background: #1e1e1e; padding: 25px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        h2 { border-bottom: 1px solid #333; padding-bottom: 10px; color: #ffffff; margin-top: 0; }
        .nav-btn { background: #34495e; border: none; color: white; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.3s;}
        .nav-btn:hover { background: #2c3e50; }
        .back-btn { display: block; width: 100%; padding: 15px; background: #34495e; color: white; border: none; border-radius: 6px; font-size: 16px; margin-top: 30px; cursor: pointer; }
        .back-btn:hover { background: #2c3e50; }
        .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #999; }
        .controls { margin-bottom: 15px; background: #252525; padding: 10px; border-radius: 8px; border: 1px solid #333; display: flex; flex-wrap: wrap; gap: 15px; }
        .checkbox-label { display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 14px; user-select: none; color: #bbb; }
        /* Status Bar Styling */
        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #000000;
            color: #888;
            padding: 5px 20px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            box-sizing: border-box;
            z-index: 100;
            border-top: 1px solid #333;
        }
        .status-ok { color: #2ecc71; font-weight: bold; }
        .status-error { color: #e74c3c; font-weight: bold; }
        body { padding-bottom: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px;">
            <h2 style="border: none; margin: 0; padding: 0; color: #fff;">DC-Leistungsverlauf</h2>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button class="nav-btn" onclick="changeDate(-1)">&#9664;</button>
                <span id="chart-date-display" style="font-size: 14px; font-weight: bold; min-width: 100px; text-align: center; color: #bbb;">Heute</span>
                <button class="nav-btn" onclick="changeDate(1)">&#9654;</button>
            </div>
        </div>

        <div class="controls">
            <label class="checkbox-label"><input type="checkbox" class="dataset-cb" value="total_dc_power" checked> DC PV-Leistung</label>
            <label class="checkbox-label"><input type="checkbox" class="dataset-cb" value="battery_soc"> Batterie SOC (%)</label>
            <label class="checkbox-label"><input type="checkbox" class="dataset-cb" value="export_power"> Export Power</label>
            <label class="checkbox-label"><input type="checkbox" class="dataset-cb" value="meter_active_power"> Netzleistung (Active)</label>
        </div>

        <div style="position: relative; height: 600px; width: 100%;">
            <canvas id="powerChart"></canvas>
        </div>

        <button class="back-btn" onclick="window.location.href='/'">Zurück zur Übersicht</button>
        
    </div>

    <div class="status-bar">
        <span>Server: <span id="server-status" class="status-ok">OK</span></span>
        <span>Letztes Update System: <span id="val_timestamp">{timestamp}</span></span>
        <span id="live-clock">--:--:--</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <script>
        let chartInstance = null;
        let currentDate = new Date();

        function updateDateDisplay() {
            const options = { year: 'numeric', month: '2-digit', day: '2-digit' };
            const today = new Date();
            if (currentDate.toDateString() === today.toDateString()) {
                document.getElementById('chart-date-display').innerText = "Heute";
            } else {
                document.getElementById('chart-date-display').innerText = currentDate.toLocaleDateString('de-DE', options);
            }
        }

        function changeDate(days) {
            currentDate.setDate(currentDate.getDate() + days);
            updateDateDisplay();
            loadChart();
        }

        // Event Listener für Checkboxen
        document.querySelectorAll('.dataset-cb').forEach(cb => {
            cb.addEventListener('change', loadChart);
        });

        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('de-DE');
            const clockEl = document.getElementById('live-clock');
            if (clockEl) {
                clockEl.textContent = timeString;
            }
        }
        
        setInterval(updateClock, 1000);
        updateClock();

        async function checkServerStatus() {
            const serverStatusEl = document.getElementById('server-status');
            const timestampEl = document.getElementById('val_timestamp');
            try {
                const response = await fetch('/api');
                if (!response.ok) throw new Error('Server not OK');
                const data = await response.json();

                if (serverStatusEl) {
                    serverStatusEl.textContent = 'OK';
                    serverStatusEl.className = 'status-ok';
                }
                if (timestampEl && data.timestamp) {
                    timestampEl.textContent = data.timestamp;
                }
            } catch (e) {
                if (serverStatusEl) {
                    serverStatusEl.textContent = 'Fehler';
                    serverStatusEl.className = 'status-error';
                }
            }
        }

        function loadChart() {
            const year = currentDate.getFullYear();
            const month = String(currentDate.getMonth() + 1).padStart(2, '0');
            const day = String(currentDate.getDate()).padStart(2, '0');
            
            // Aktive Checkboxen sammeln
            const selectedCols = Array.from(document.querySelectorAll('.dataset-cb:checked')).map(cb => cb.value);
            if (selectedCols.length === 0) selectedCols.push("total_dc_power"); // Fallback

            const dateStr = `${year}-${month}-${day}`;
            const colsStr = selectedCols.join(',');

            const serverStatusEl = document.getElementById('server-status');

            fetch(`/api/history?date=${dateStr}&cols=${colsStr}`)
            .then(function(r) { 
                if (r.ok && serverStatusEl) {
                    serverStatusEl.textContent = "OK";
                    serverStatusEl.className = "status-ok";
                }
                return r.json(); 
            })
            .then(function(data) {
                if (chartInstance) {
                    chartInstance.destroy();
                }
                
                // Datasets dynamisch bauen
                const datasets = [];
                
                // Konfiguration für die verschiedenen Datentypen
                const configs = {
                    'total_dc_power': { label: 'PV Leistung (W)', color: '#2ecc71', fill: true, yAxisID: 'y' },
                    'battery_soc': { label: 'SOC (%)', color: '#9b59b6', fill: false, yAxisID: 'y1' },
                    'export_power': { label: 'Export (W)', color: '#f1c40f', fill: false, yAxisID: 'y' },
                    'meter_active_power': { label: 'Netz (W)', color: '#e74c3c', fill: false, yAxisID: 'y' }
                };

                // Über die Antwort iterieren (Keys sind die Spaltennamen)
                if (data.datasets) {
                    for (const [key, values] of Object.entries(data.datasets)) {
                        const cfg = configs[key] || { label: key, color: '#333', fill: false, yAxisID: 'y' };
                        datasets.push({
                            label: cfg.label,
                            data: values,
                            borderColor: cfg.color,
                            backgroundColor: cfg.color + '20', // Transparenter Hintergrund
                            fill: cfg.fill,
                            tension: 0.3,
                            pointRadius: 0,
                            borderWidth: 2,
                            yAxisID: cfg.yAxisID
                        });
                    }
                }

                chartInstance = new Chart(document.getElementById('powerChart'), {
                type: 'line',
                data: {
                    labels: data.labels || [], 
                    datasets: datasets
                },
                options: {
                    animation: false,
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    scales: {
                        x: { 
                            grid: { color: '#333' },
                            ticks: { maxTicksLimit: 12, color: '#aaa', font: { size: 11 } } 
                        },
                        y: { 
                            type: 'linear',
                            display: true,
                            position: 'left',
                            beginAtZero: true, 
                            grid: { color: '#333' },
                            ticks: { color: '#aaa' },
                            title: { display: true, text: 'Watt', color: '#fff' } 
                        },
                        y1: {
                            type: 'linear',
                            display: datasets.some(d => d.yAxisID === 'y1'), // Nur anzeigen wenn SOC gewählt
                            position: 'right',
                            min: 0,
                            max: 100,
                            grid: { drawOnChartArea: false },
                            ticks: { color: '#aaa' },
                            title: { display: true, text: 'SOC (%)', color: '#fff' }
                        }
                    },
                    plugins: { legend: { labels: { color: '#fff' } } }
                }
                });
            })
            .catch(function(e) {
                if (serverStatusEl) { serverStatusEl.textContent = "Fehler"; serverStatusEl.className = "status-error"; }
                console.error(e);
            });
        }

        // Initial laden
        updateDateDisplay();
        loadChart();

        // Periodischer Server-Check
        setInterval(checkServerStatus, 5000);
    </script>
</body>
</html>
